openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Clario grammar correction API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: Text analysis operations
  - name: documents
    description: Document management
  - name: profile
    description: User profile
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyze:
    post:
      operationId: analyzeText
      tags: [analyze]
      summary: Analyze text for grammar, fluency, clarity, and engagement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all saved documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Save a document with its analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /stats:
    get:
      operationId: getStats
      tags: [profile]
      summary: Get user statistics and average scores
      responses:
        "200":
          description: User statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AnalyzeInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
        sourceType:
          type: string
          enum: [text, pdf, doc, gmail]
          default: text

    Correction:
      type: object
      required: [original, corrected, explanation, type]
      properties:
        original:
          type: string
        corrected:
          type: string
        explanation:
          type: string
        type:
          type: string
          enum: [grammar, fluency, clarity, engagement, spelling]

    AnalysisResult:
      type: object
      required: [correctedText, grammarScore, fluencyScore, clarityScore, engagementScore, corrections, overallScore]
      properties:
        correctedText:
          type: string
        grammarScore:
          type: integer
          minimum: 0
          maximum: 100
        fluencyScore:
          type: integer
          minimum: 0
          maximum: 100
        clarityScore:
          type: integer
          minimum: 0
          maximum: 100
        engagementScore:
          type: integer
          minimum: 0
          maximum: 100
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
        corrections:
          type: array
          items:
            $ref: "#/components/schemas/Correction"
        summary:
          type: ["string", "null"]

    Document:
      type: object
      required: [id, title, originalText, correctedText, grammarScore, fluencyScore, clarityScore, engagementScore, overallScore, sourceType, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        originalText:
          type: string
        correctedText:
          type: string
        grammarScore:
          type: integer
        fluencyScore:
          type: integer
        clarityScore:
          type: integer
        engagementScore:
          type: integer
        overallScore:
          type: integer
        sourceType:
          type: string
        corrections:
          type: array
          items:
            $ref: "#/components/schemas/Correction"
        createdAt:
          type: string

    DocumentInput:
      type: object
      required: [title, originalText, correctedText, grammarScore, fluencyScore, clarityScore, engagementScore, overallScore, sourceType]
      properties:
        title:
          type: string
        originalText:
          type: string
        correctedText:
          type: string
        grammarScore:
          type: integer
        fluencyScore:
          type: integer
        clarityScore:
          type: integer
        engagementScore:
          type: integer
        overallScore:
          type: integer
        sourceType:
          type: string
        corrections:
          type: array
          items:
            $ref: "#/components/schemas/Correction"

    Profile:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string

    UserStats:
      type: object
      required: [totalDocuments, avgGrammarScore, avgFluencyScore, avgClarityScore, avgEngagementScore, avgOverallScore, recentDocuments]
      properties:
        totalDocuments:
          type: integer
        avgGrammarScore:
          type: number
        avgFluencyScore:
          type: number
        avgClarityScore:
          type: number
        avgEngagementScore:
          type: number
        avgOverallScore:
          type: number
        recentDocuments:
          type: array
          items:
            $ref: "#/components/schemas/Document"
