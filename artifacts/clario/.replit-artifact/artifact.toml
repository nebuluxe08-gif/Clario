kind = "web"
previewPath = "/"
title = "Clario"
version = "1.0.0"
id = "artifacts/clario"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25238

[services.development]
run = "pnpm --filter @workspace/clario run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clario", "run", "build" ]
publicDir = "artifacts/clario/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25238"
BASE_PATH = "/"
